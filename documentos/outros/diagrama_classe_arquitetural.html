function boxHeight(box) {
  let h = TITLE_H + 8;
  for (const m of box.members) h += m.sep ? SEP_H : ROW_H;
  return h;
}

function layerHeight(layer) {
  return Math.max(...layer.boxes.map(boxHeight));
}

const positions = {};
let currentY = MARGIN_TOP + 20;
for (const layer of layers) {
  const lh = layerHeight(layer);
  let currentX = MARGIN_LEFT;
  for (const box of layer.boxes) {
    const bh = boxHeight(box);
    positions[box.id] = {
      x: currentX, y: currentY, w: BOX_W, h: bh,
      cx: currentX + BOX_W / 2, cy: currentY + bh / 2,
      top: currentY, bot: currentY + bh,
      left: currentX, right: currentX + BOX_W,
      midY: currentY + bh / 2,
    };
    currentX += BOX_W + BOX_GAP;
  }
  layer._y = currentY;
  layer._h = lh;
  currentY += lh + LAYER_GAP;
}

const allPos = Object.values(positions);
const svgW = Math.max(...allPos.map(p => p.right)) + MARGIN_LEFT;
const svgH = currentY - LAYER_GAP + MARGIN_TOP;
const svg = document.getElementById("main");
svg.setAttribute("width", svgW);
svg.setAttribute("height", svgH);
svg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);

function el(tag, attrs, parent = svg) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

function txt(content, attrs, parent = svg) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", "text");
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  e.textContent = content;
  parent.appendChild(e);
  return e;
}

  el("rect", { x:0, y:layer._y - 20, width:svgW, height:layer._h + 28, fill:"#f8f8f8", stroke:"#ccc", "stroke-width":"0.5" });
  txt(layer.label.toUpperCase(), {
    x:MARGIN_LEFT, y:layer._y - 6, "font-size":"9", "font-weight":"bold",
    fill:"#555", "letter-spacing":"0.08em",
  });
}

for (const layer of layers) {
  for (const box of layer.boxes) {
    const p = positions[box.id];
    const g = el("g", {});
    el("rect", {
      x:p.x, y:p.y, width:p.w, height:p.h, fill:"#fff", stroke:"#000", "stroke-width":"1",
      ...(box.planned ? {"stroke-dasharray":"5,3"} : {})
    }, g);
    el("rect", { x:p.x + 1, y:p.y + 1, width:p.w - 2, height:TITLE_H - 2, fill:"#eee" }, g);
    txt(box.stereotype, { x:p.cx, y:p.y + 12, "font-size":"9", "text-anchor":"middle", "font-style":"italic" }, g);
    txt(box.name, { x:p.cx, y:p.y + 26, "font-size":"11", "font-weight":"bold", "text-anchor":"middle" }, g);
    el("line", { x1:p.x, y1:p.y + TITLE_H, x2:p.right, y2:p.y + TITLE_H, stroke:"#000", "stroke-width":"1" }, g);
    if (box.planned) {
      txt("«planned»", { x:p.cx, y:p.y + TITLE_H - 3, "font-size":"8", "text-anchor":"middle", fill:"#555", "font-style":"italic" }, g);
    }
    let y = p.y + TITLE_H + 12;
    for (const m of box.members) {
      if (m.sep) {
        el("line", { x1:p.x + 4, y1:y - 4, x2:p.right - 4, y2:y - 4, stroke:"#000", "stroke-width":"0.5", "stroke-dasharray":"2,2" }, g);
        y += SEP_H;
        continue;
      }
      if (m.note) {
        txt(m.text, { x:p.x + 8, y, "font-size":"8.5", fill:"#444", "font-style":"italic" }, g);
      } else {
        txt(m.vis, { x:p.x + 8, y, "font-size":"10", "font-weight":"bold" }, g);
        txt(m.text, { x:p.x + 18, y, "font-size":"10" }, g);
      }
      y += ROW_H;
    }
  }
}

function drawArrow(fromId, toId, type, label = "") {
  const A = positions[fromId];
  const B = positions[toId];
  if (!A || !B) return;
  let x1, y1, x2, y2;
  if (A.bot <= B.top + 5) {
    x1 = A.cx; y1 = A.bot; x2 = B.cx; y2 = B.top;
  } else if (A.top >= B.bot - 5) {
    x1 = A.cx; y1 = A.top; x2 = B.cx; y2 = B.bot;
  } else if (A.cx < B.cx) {
    x1 = A.right; y1 = A.midY; x2 = B.left; y2 = B.midY;
  } else {
    x1 = A.left; y1 = A.midY; x2 = B.right; y2 = B.midY;
  }
  const marker = type === "assoc" ? "url(#arr-assoc)" : type === "real" ? "url(#arr-real)" : "url(#arr-dep)";
  const attrs = { x1, y1, x2, y2, stroke:"#000", "stroke-width":"1", "marker-end":marker, opacity:"0.85" };
  if (type === "dep" || type === "real") attrs["stroke-dasharray"] = "5,3";
  el("line", attrs);
  if (label) txt(label, { x:(x1+x2)/2 + 4, y:(y1+y2)/2 - 3, "font-size":"8", fill:"#333", "font-style":"italic" });
}

[
  ["AuthCtrl","AuthSvc","dep"], ["AdminCtrl","AdminSvc","dep"], ["CompCtrl","CompSvc","dep"],
  ["TeamCtrl","TeamSvc","dep"], ["AthCtrl","AthSvc","dep"], ["CkpCtrl","CkpSvc","dep"],
  ["RankCtrl","RankSvc","dep"], ["ExpCtrl","ExpSvc","dep"], ["ReportCtrl","ReportSvc","dep"],
  ["UserCtrl","UserSvc","dep"],
  ["CompCtrl","CompVal","dep"], ["TeamCtrl","TeamVal","dep"], ["AthCtrl","AthVal","dep"], ["CkpCtrl","CkpVal","dep"],
  ["AuthSvc","AdminRepo","assoc"], ["AdminSvc","AdminRepo","assoc"], ["CompSvc","CompRepo","assoc"],
  ["TeamSvc","TeamRepo","assoc"], ["AthSvc","AthRepo","assoc"], ["CkpSvc","CkpRepo","assoc"],
  ["RankSvc","CkpSvc","assoc"], ["RankSvc","TeamSvc","assoc"],
  ["ExpSvc","ExpRepo","assoc"], ["ExpSvc","RankSvc","assoc"], ["ReportSvc","ReportRepo","assoc"],
  ["UserSvc","UserRepo","assoc"],
  ["AdminRepo","AdminModel","real"], ["CompRepo","CompModel","real"], ["TeamRepo","TeamModel","real"],
  ["AthRepo","AthModel","real"], ["CkpRepo","CkpModel","real"], ["ExpRepo","ExpModel","real"],
  ["ReportRepo","ReportModel","real"],
  ["AuthSvc","AuthModel","real"], ["RankSvc","RankModel","real"],
  ["AdminRepo","Supa","dep"], ["CompRepo","Supa","dep"], ["TeamRepo","Supa","dep"],
  ["AthRepo","Supa","dep"], ["CkpRepo","Supa","dep"], ["ExpRepo","Supa","dep"],
  ["ReportRepo","Supa","dep"],
  ["CompCtrl","AsyncH","dep"], ["TeamCtrl","AsyncH","dep"], ["AthCtrl","AsyncH","dep"],
  ["CkpCtrl","AsyncH","dep"], ["RankCtrl","AsyncH","dep"], ["ExpCtrl","AsyncH","dep"],
  ["ReportCtrl","AsyncH","dep"], ["AuthCtrl","AsyncH","dep"], ["AdminCtrl","AsyncH","dep"],
  ["AdminSvc","AppErr","dep"], ["CompSvc","AppErr","dep"], ["AthSvc","AppErr","dep"],
  ["TeamSvc","AppErr","dep"], ["CkpSvc","AppErr","dep"], ["AuthSvc","AppErr","dep"],
  ["ExpSvc","AppErr","dep"], ["ReportSvc","AppErr","dep"], ["RankSvc","AppErr","dep"],
  ["ErrH","AppErr","assoc"],
].forEach(([from, to, type]) => drawArrow(from, to, type));
</script>
